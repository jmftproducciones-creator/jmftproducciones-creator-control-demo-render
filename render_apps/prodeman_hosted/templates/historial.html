<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Historial de acciones</title>
  <style>
    body { background:#111; color:#eee; font-family:system-ui; padding:20px; }
    table { border-collapse:collapse; width:100%; margin-top:20px; }
    th, td { border:1px solid #333; padding:8px; text-align:left; }
    th { background:#222; }
  </style>
</head>
<body>
  <h1>📜 Historial de acciones</h1>
  <table id="tablaHistorial">
    <thead><tr><th>Fecha</th><th>Usuario</th><th>Acción</th><th>ID muestra</th></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    fetch("/historial").then(r=>r.json()).then(data=>{
      const tbody=document.querySelector("#tablaHistorial tbody");
      tbody.innerHTML=data.map(h=>`
        <tr>
          <td>${h.fecha}</td>
          <td>${h.usuario}</td>
          <td>${h.accion}</td>
          <td>${h.id_muestra || ""}</td>
        </tr>
      `).join("");
    });
  </script>
</body>
</html>
